server:
  port: 8081

spring:
  application:
    name: IMAGE-SERVICE

  data:
    mongodb:
      uri: mongodb://localhost:27017/ai_detection

  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"